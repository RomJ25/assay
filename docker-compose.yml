services:
  assay:
    build: .
    container_name: assay
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ASSAY_RESULTS=/app/data/results
      - ASSAY_CACHE_DB=/app/data/cache.db
      - ASSAY_UNIVERSE=${ASSAY_UNIVERSE:-sp500}
      - ASSAY_TOP_N=${ASSAY_TOP_N:-30}
      - ASSAY_MODE=server
      # Daily auto-refresh schedule (24h format, container timezone)
      - ASSAY_SCHEDULE_HOUR=06
      - ASSAY_SCHEDULE_MIN=00
    volumes:
      - assay_data:/app/data
      - assay_logos:/app/storage/logos
    restart: unless-stopped
    init: true
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  scan:
    build: .
    container_name: assay-scan
    profiles: ["scan"]
    environment:
      - PYTHONUNBUFFERED=1
      - ASSAY_RESULTS=/app/data/results
      - ASSAY_CACHE_DB=/app/data/cache.db
      - ASSAY_UNIVERSE=${ASSAY_UNIVERSE:-sp500}
      - ASSAY_TOP_N=${ASSAY_TOP_N:-30}
      - ASSAY_MODE=scan
    volumes:
      - assay_data:/app/data
      - assay_logos:/app/storage/logos
    restart: on-failure

volumes:
  assay_data:
  assay_logos:
